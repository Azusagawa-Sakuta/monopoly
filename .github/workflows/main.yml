name: Qt Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    if: ${{ true }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Qt
      uses: jurplel/install-qt-action@v4
      with:
        host: 'linux'

    - name: Install Build Tools
      run: sudo apt-get update && sudo apt-get install -y build-essential cmake qt5-qmake qtbase5-dev

    - name: Build Qt Project
      run: |
        mkdir build
        cd build
        qmake ../frontend/frontend.pro
        make

    - uses: actions/upload-artifact@v4
      with:
        name: Monopoly-Qt-Linux
        path: build/monopoly
        if-no-files-found: warn

  build-macos:
    if: ${{ true }}
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Qt
      uses: jurplel/install-qt-action@v4
      with:
        host: 'mac'

    - name: Install Build Tools
      run: brew install cmake

    - name: Build Qt Project
      run: |
        mkdir build
        cd build
        qmake ../frontend/frontend.pro
        make

    - uses: actions/upload-artifact@v4
      with:
        name: Monopoly-Qt-macOS
        path: build/monopoly.app
        if-no-files-found: warn

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Visual Studio Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        toolset: 14.50

    - name: Set up Qt
      uses: jurplel/install-qt-action@v4
      with:
        host: windows

    - name: Build Qt Project
      shell: cmd
      run: |
        mkdir build
        cd build
        qmake ..\frontend\frontend.pro
        nmake

    - name: Deploy Qt Dependencies
      shell: cmd
      run: |
        cd build\release
        windeployqt monopoly.exe --release --no-compiler-runtime

    - name: Clean up build directory
      shell: cmd
      run: |
        del /s /q build\release\*.pdb
        del /s /q build\release\*.ilk
        del /s /q build\release\*.exp
        del /s /q build\release\*.lib
        del /s /q build\release\*.obj
        del /s /q build\release\*.h
        del /s /q build\release\*.cpp

    - uses: actions/upload-artifact@v4
      with:
        name: Monopoly-Qt-Windows
        path: build\release\**
        if-no-files-found: warn
